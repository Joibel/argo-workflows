name: PR Labels

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 minutes
  workflow_dispatch: # allow manual trigger

permissions:
  contents: read
  pull-requests: write
  checks: read
  statuses: read

jobs:
  label-prs:
    runs-on: ubuntu-24.04
    steps:
      - name: Label PRs based on CI status
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const { owner, repo } = context.repo;

            // Define check-to-label mappings
            const checkLabelMap = {
              'Codegen': 'needs/codegen',
              'Lint': 'needs/lint',
              'feature-pr-handling': 'needs/feature-note',
              'dco': 'needs/dco',
              'DCO': 'needs/dco',
            };

            // Get all open PRs
            const prs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
            });

            for (const pr of prs) {
              const prNumber = pr.number;
              const headSha = pr.head.sha;
              const currentLabels = pr.labels.map(l => l.name);

              console.log(`Processing PR #${prNumber} (${headSha})`);

              // Get check runs for this PR
              const { data: checkRuns } = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: headSha,
              });

              // Get commit statuses for this PR (for DCO app which uses status API)
              const { data: statuses } = await github.rest.repos.getCombinedStatusForRef({
                owner,
                repo,
                ref: headSha,
              });

              // Build a map of check name -> conclusion
              const checkResults = {};

              for (const run of checkRuns.check_runs) {
                // Only consider completed checks
                if (run.status === 'completed') {
                  checkResults[run.name] = run.conclusion;
                }
              }

              // Add statuses (like DCO) to the map
              for (const status of statuses.statuses) {
                checkResults[status.context] = status.state === 'success' ? 'success' : 'failure';
              }

              console.log(`  Check results: ${JSON.stringify(checkResults)}`);

              // Process each check-label mapping
              for (const [checkName, labelName] of Object.entries(checkLabelMap)) {
                const result = checkResults[checkName];
                const hasLabel = currentLabels.includes(labelName);

                if (result === 'failure') {
                  // Check failed - add label if not present
                  if (!hasLabel) {
                    console.log(`  Adding label '${labelName}' (check '${checkName}' failed)`);
                    try {
                      await github.rest.issues.addLabels({
                        owner,
                        repo,
                        issue_number: prNumber,
                        labels: [labelName],
                      });
                    } catch (e) {
                      console.log(`  Failed to add label: ${e.message}`);
                    }
                  }
                } else if (result === 'success') {
                  // Check passed - remove label if present
                  if (hasLabel) {
                    console.log(`  Removing label '${labelName}' (check '${checkName}' passed)`);
                    try {
                      await github.rest.issues.removeLabel({
                        owner,
                        repo,
                        issue_number: prNumber,
                        name: labelName,
                      });
                    } catch (e) {
                      console.log(`  Failed to remove label: ${e.message}`);
                    }
                  }
                }
                // If check hasn't run or is still running, don't change labels
              }
            }
